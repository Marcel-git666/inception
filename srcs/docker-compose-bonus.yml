services:
  # --- DATABASE ---
  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    restart: always
    # Connect environment variables from the .env file
    env_file: .env
    # Map the named volume to the correct directory inside the container
    volumes:
      - mariadb_data:/var/lib/mysql
    # Connect the container to our custom network
    networks:
      - inception

  # --- WORDPRESS APP ---
  wordpress:
    build: requirements/wordpress
    container_name: wordpress
    restart: always
    env_file: .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    # Ensure WordPress starts only after the database is up
    depends_on:
      - mariadb

  # --- WEB SERVER (NGINX) ---
  nginx:
    build: requirements/nginx
    container_name: nginx
    restart: always
    env_file: .env
    # NGINX is the only entry point to the infrastructure
    ports:
      - "443:443"
    # NGINX needs access to the web files to serve static content
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress

  # --- BONUS: ADMINER ---
  adminer:
    build: requirements/bonus/adminer
    container_name: adminer
    restart: always
    # We expose port 8080 to the host for the bonus part 
    ports:
      - "8080:8080"
    networks:
      - inception
    depends_on:
      - mariadb

# --- NETWORK DEFINITION ---
networks:
  inception:
    driver: bridge

# --- VOLUMES DEFINITION ---
# Local named volumes securely mapped to the host's directory
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mmravec/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mmravec/data/wordpress
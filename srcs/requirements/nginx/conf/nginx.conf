events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Listen ONLY on port 443 with SSL enabled
        listen 443 ssl;
        listen [::]:443 ssl;

        # Your domain name
        server_name mmravec.42.fr;

        # Paths to the certificates we generated in the Dockerfile
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Strictly allow only TLSv1.2 and TLSv1.3 protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # Where the website files will be stored (we will map the volume here later)
        root /var/www/html;
        index index.php index.html index.htm;

        location / {
            try_files $uri $uri/ =404;
        }

        # Redirect PHP requests to the WordPress container on port 9000
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            # NGINX will look for a container named 'wordpress' in the Docker network
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # BONUS: Redirect /bonus requests to the Lighttpd container
        location ^~ /bonus {
            resolver 127.0.0.11 valid=30s;
            set $upstream_lighttpd http://lighttpd:3000;
            proxy_pass $upstream_lighttpd/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
# Basic server settings
listen=YES
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# Chroot settings (locks user in their home directory)
chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd/empty

# Passive mode settings (required for Docker/Cloud environments)
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009
pasv_address=mmravec.42.fr

# Disable anonymous access
anonymous_enable=NO